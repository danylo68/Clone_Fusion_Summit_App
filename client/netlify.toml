[build]
  base    = "client"
  command = "npx ng build"
  publish = "dist/fusion-summit-client/browser"

[[redirects]]
  from   = "/api/*"
  to     = "https://clonefusionsummit-production.up.railway.app/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200